<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Page</title>
    <link rel="stylesheet" href="styles.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    </head> 
    <body role="container" class="container">    
        <div role="qr-container"class="qr-container">
            <section class="qr-image">
                <img class= "image" src="qr-code-component-main/images/image-qr-code.png" alt="QR Code Image" >
            </section>
            <section role="qr-info" class="qr-info">
              <h1 role="banner" class="qr-heading">Improve your front-end skills by building projects</h1>
              <p role="main-content"class="qr-para">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
            </section>
        </div>
    </body>
    </html>
